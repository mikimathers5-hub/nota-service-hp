name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Delete lock file if exists (force fresh install)
      - name: Remove lock file
        run: rm -f package-lock.json npm-shrinkwrap.json

      # Fresh install
      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Prepare www directory
        run: |
          mkdir -p www
          # Verify files exist
          test -f index.html || (echo "ERROR: index.html not found" && exit 1)
          cp index.html www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || echo '{}' > www/manifest.json
          cp service-worker.js www/ 2>/dev/null || true
          touch www/icon.png www/icon-512.png
          ls -la www/

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotaService-${{ github.event.inputs.build_type || 'debug' }}-v${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'debug' }}/*.apk
          retention-days: 30
