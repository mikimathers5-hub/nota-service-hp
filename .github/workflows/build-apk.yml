name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Setup JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Install Android platforms and tools
      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "platform-tools"
          sdkmanager "cmdline-tools;latest"

      # Prepare web assets
      - name: Prepare www directory
        run: |
          mkdir -p www
          cp www/index.html www/ 2>/dev/null || cp index.html www/ 2>/dev/null || echo "Using existing www"
          cp www/manifest.json www/ 2>/dev/null || cp manifest.json www/ 2>/dev/null || true
          cp www/service-worker.js www/ 2>/dev/null || cp service-worker.js www/ 2>/dev/null || true
          # Create placeholder icons
          touch www/icon.png
          touch www/icon-512.png
          ls -la www/

      # Sync Capacitor
      - name: Capacitor Sync
        run: npx cap sync android

      # Copy capacitor.config.json to android
      - name: Copy config
        run: |
          cp capacitor.config.json android/ 2>/dev/null || true

      # Build Debug APK
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      # Build Release APK (unsigned)
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # Upload Debug APK
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: NotaService-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Upload Release APK
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: NotaService-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # Create Release (on tag)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
