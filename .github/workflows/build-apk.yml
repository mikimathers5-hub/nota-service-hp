name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # Prepare www
      - name: Prepare www directory
        run: |
          mkdir -p www
          # Copy files dengan pengecekan
          if [ -f "index.html" ]; then
            cp index.html www/
          else
            echo "ERROR: index.html not found in root"
            ls -la
            exit 1
          fi
          
          cp manifest.json www/ 2>/dev/null || echo '{"name":"Nota Service HP","short_name":"NotaService","start_url":".","display":"standalone"}' > www/manifest.json
          cp service-worker.js www/ 2>/dev/null || echo '// Service Worker' > www/service-worker.js
          
          # Create placeholder icons
          touch www/icon.png
          touch www/icon-512.png
          
          echo "=== www directory contents ==="
          ls -la www/

      # Hapus folder android lama jika ada (clean build)
      - name: Clean Android folder
        run: rm -rf android

      # Add Android platform
      - name: Add Android Platform
        run: npx cap add android

      # Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # Copy config ke android (penting!)
      - name: Copy Capacitor Config
        run: |
          cp capacitor.config.json android/
          ls -la android/

      # Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble${{ github.event.inputs.build_type == 'release' && 'Release' || 'Debug' }} --stacktrace

      # Upload hasil
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotaService-${{ github.event.inputs.build_type || 'debug' }}-v${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'debug' }}/*.apk
          retention-days: 30

      # Optional: Create Release untuk tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
