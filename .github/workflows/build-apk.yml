name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Check dan install dengan method yang tepat
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "Found package-lock.json, using npm ci"
            npm ci
          else
            echo "No package-lock.json, using npm install"
            npm install
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      # Prepare www dengan cek file
      - name: Prepare assets
        run: |
          mkdir -p www
          # Copy dengan fallback
          if [ -f "index.html" ]; then
            cp index.html www/
          elif [ -f "www/index.html" ]; then
            echo "index.html already in www"
          else
            echo "ERROR: index.html not found"
            exit 1
          fi
          
          cp manifest.json www/ 2>/dev/null || echo '{"name":"Nota Service"}' > www/manifest.json
          cp service-worker.js www/ 2>/dev/null || true
          touch www/icon.png www/icon-512.png
          ls -la www/

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotaService-${{ github.event.inputs.build_type || 'debug' }}
          path: android/app/build/outputs/apk/${{ github.event.inputs.build_type || 'debug' }}/*.apk
          retention-days: 30
